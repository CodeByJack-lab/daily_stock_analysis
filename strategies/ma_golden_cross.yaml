# MA Golden Cross Strategy

name: ma_golden_cross
display_name: MA Golden Cross
description: Detects MA golden cross with volume confirmation. Classic trend reversal/continuation signal.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [golden cross, MA cross]
default_priority: 20
market_regimes: [trending_up]

instructions: |
  **MA Golden Cross Strategy**

  Signal criteria:

  1. **Golden Cross Detection**:
     - Use `analyze_trend` to check MA alignment and MACD status.
     - Primary signal: MA5 crosses above MA10 within the last 3 trading days.
     - Strong signal: MA10 crosses above MA20 (slower but more reliable).
     - Check if MACD status is golden cross or above zero-line cross.

  2. **Volume Confirmation**:
     - Cross day volume should exceed 5-day average volume.
     - Use `get_daily_history` to verify.
     - Volume ratio > 1.2 on cross day is a positive signal.

  3. **Trend Context**:
     - Cross after consolidation: strongest signal.
     - Cross within uptrend: continuation signal.
     - Cross during deep decline: weak signal, requires more confirmation.

  4. **Price Position**:
     - Price should be near or above the crossing MAs.
     - Bias rate < 5% — avoid chasing delayed entries.

  Score adjustments:
  - MA5 x MA10 golden cross with volume: sentiment_score +10
  - MA10 x MA20 golden cross: sentiment_score +8
  - MACD golden cross above zero line: additional +5
  - Note "MA golden cross" in `ma_analysis` and `buy_reason`.
  - Ideal entry near the crossing MA levels.
