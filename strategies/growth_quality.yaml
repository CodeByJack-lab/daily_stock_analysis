name: growth_quality
display_name: Growth Quality
description: Revenue growth, ROE, cash flow and growth sustainability analysis.
category: fundamental
core_rules: [1, 2]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [growth, quality growth]
default_priority: 45
market_regimes: [trending_up]

instructions: |
  **Growth Quality Strategy**

  Evaluation criteria:
  - Revenue growth YoY > 15%.
  - Net income growth YoY > 20%.
  - ROE > 15% consistently.
  - Free cash flow positive.
  - Gross margin stable or expanding.
  - Low debt-to-equity ratio.
  - Price trend must be bullish (MA alignment).

  Score adjustments:
  - All growth metrics strong: sentiment_score +10
  - Mixed fundamentals: no adjustment
  - Deteriorating fundamentals: sentiment_score -10
