name: event_driven
display_name: Event Driven
description: Earnings, policy, orders, M&A and other catalyst events.
category: catalyst
core_rules: [1, 5]
required_tools:
  - search_stock_news
  - get_daily_history
aliases: [catalyst, event driven]
default_priority: 25
market_regimes: [trending_up, sideways]

instructions: |
  **Event Driven Strategy**

  Signal criteria:
  - Identify upcoming or recent catalyst events via `search_stock_news`.
  - Earnings beats, new contracts, policy support, M&A announcements.
  - Price reaction to event: gap up with volume = strong signal.
  - Avoid buying into events already fully priced in (extended rally before event).
  - Post-event price stabilization above key MAs = secondary entry.

  Score adjustments:
  - Strong catalyst confirmed: sentiment_score +10
  - Catalyst + price breakout: additional +5
  - Negative catalyst: sentiment_score -15
