name: emotion_cycle
display_name: Emotion Cycle
description: Trade based on market sentiment highs and lows rotation.
category: sentiment
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - search_stock_news
aliases: [sentiment cycle, emotion cycle]
default_priority: 80
market_regimes: [sideways, trending_up]

instructions: |
  **Emotion Cycle Strategy**

  Analysis framework:
  - Identify market sentiment extremes (fear/greed).
  - Buy during extreme fear phases when fundamentals are intact.
  - Reduce exposure during extreme greed phases.
  - Use news sentiment and volume patterns to gauge emotion.
  - RSI extremes (< 30 or > 70) combined with volume spikes signal cycle turns.

  Score adjustments:
  - Extreme fear + fundamental support: sentiment_score +8
  - Extreme greed + volume divergence: sentiment_score -8
