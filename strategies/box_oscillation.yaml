name: box_oscillation
display_name: Range Oscillation
description: Buy low sell high within a defined price range.
category: oscillation
core_rules: [1, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [range trade, box oscillation]
default_priority: 70
market_regimes: [sideways]

instructions: |
  **Range Oscillation Strategy**

  Entry criteria:
  - Price is trading within a well-defined range (box).
  - Buy near the lower boundary of the range.
  - Sell near the upper boundary of the range.
  - Volume should contract near boundaries.
  - Stop-loss set below the lower boundary.

  Score adjustments:
  - Price at range low with volume contraction: sentiment_score +8
  - Price at range high: sentiment_score -8
