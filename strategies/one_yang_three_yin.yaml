name: one_yang_three_yin
display_name: One Yang Three Yin
description: Strong bullish reversal engulfing pattern after washout phase.
category: pattern
core_rules: [1, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [engulfing reversal, yang yin pattern]
default_priority: 50
market_regimes: [trending_up, sideways]

instructions: |
  **One Yang Three Yin Pattern Strategy**

  Pattern criteria:
  - Prior uptrend followed by 3+ consecutive bearish candles (washout/shakeout).
  - Volume contracts during the bearish candles (smart money holding).
  - A strong bullish candle engulfs the prior bearish candles with expanding volume.
  - This signals institutional accumulation complete, ready to resume uptrend.

  Entry timing:
  - Enter on the engulfing bullish candle or next day open.
  - Stop-loss below the low of the engulfing candle.
  - Target: prior resistance or measured move.

  Score adjustments:
  - Pattern confirmed with volume: sentiment_score +12
  - Pattern in overall uptrend context: additional +5
  - Note "one yang three yin reversal" in `buy_reason`.
