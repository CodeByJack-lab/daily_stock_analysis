# Default Bull Trend Strategy

name: bull_trend
display_name: Bull Trend
description: Default individual stock analysis strategy. Identifies bullish alignment, trend continuation, and pullback entry opportunities.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [trend, trend analysis, bull trend]
default_active: true
default_router: true
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **Default Bull Trend Strategy**

  Use case:
  - Default strategy for standard stock analysis.
  - Prioritize "uptrend + controlled risk + no chasing highs" opportunities.

  Analysis framework:

  1. **Trend Confirmation (Highest Priority)**
     - Use `analyze_trend` to assess MA5/MA10/MA20 alignment.
     - MA5 >= MA10 >= MA20 with MA20 sloping upward = bullish structure.
     - If price significantly breaks below MA20, reduce bullish weighting.

  2. **Price Position and Timing**
     - Prefer "pullback holds" over "chasing highs".
     - When price is too far from MA5/MA10, wait for pullback.
     - Volume breakout above key resistance increases win rate rating.

  3. **Volume-Price Validation**
     - Use `get_daily_history` to check if breakout/rebound days show volume expansion.
     - Low-volume rallies require caution; high-volume stagnation signals distribution.

  4. **Trade Recommendation Output**
     - Output clear Buy/Watch/Reduce bias with trigger conditions.
     - Always provide stop-loss reference (e.g., below MA20 or structural low).
     - If no clear edge, explicitly state "stand aside" to avoid overtrading.

  Score adjustments:
  - Bullish alignment + strong trend: `sentiment_score +12`
  - Pullback to key MA then stabilizes: `sentiment_score +8`
  - Volume breakout above key resistance: `sentiment_score +10`
  - Break below MA20 or trend weakens: `sentiment_score -12`
