# Dragon Head Strategy (Sector Leader)

name: dragon_head
display_name: Sector Leader
description: Identifies sector leaders during sector rotation cycles. Applicable when sector launches or industry catalyst appears.
category: trend
core_rules: [2, 7]
required_tools:
  - get_realtime_quote
  - get_sector_rankings
  - search_stock_news
aliases: [sector leader, dragon head]
default_priority: 90
market_regimes: [sector_hot]

instructions: |
  **Sector Leader Strategy**

  Evaluation criteria:

  1. **Sector Leadership**:
     - Use `get_sector_rankings` to check if the stock's sector is among recent top performers.
     - Confirm if the stock led the sector rally or hit limit-up first during sector launch.

  2. **Turnover Rate and Momentum**:
     - Use `get_realtime_quote` to check turnover rate. Sector leaders typically show turnover > 5%.
     - Volume ratio > 1.5 indicates active trading interest.

  3. **Relative Strength**:
     - Compare stock's gain/loss vs sector average.
     - True leaders should outperform sector by 2%+ on up days.

  4. **News Catalyst**:
     - Use `search_stock_news` to search for sector-level catalysts (policy, events, earnings).
     - Sector leader rallies are typically accompanied by broad sector catalysts.

  5. **Bias Rate Check**:
     - Sector leaders can tolerate higher bias rate up to 7%, but > 10% still requires caution.

  Score adjustments:
  - Confirmed sector leader: sentiment_score +10
  - Sector in active rotation phase: additional +5
  - Note "sector leader" judgment in `buy_reason`.
