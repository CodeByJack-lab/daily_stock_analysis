name: wave_theory
display_name: Elliott Wave
description: Elliott wave counting for market position assessment.
category: advanced
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [elliott wave, wave count]
default_priority: 95
market_regimes: [trending_up]

instructions: |
  **Elliott Wave Strategy**

  Analysis framework:
  - Count impulse waves (1-2-3-4-5) and corrective waves (A-B-C).
  - Wave 3 is typically the strongest and longest — highest priority buy zone.
  - Wave 4 pullback provides secondary entry after wave 3 peak.
  - Avoid buying in wave 5 (exhaustion risk).
  - Use Fibonacci retracement levels to estimate wave targets.

  Score adjustments:
  - Early wave 3 confirmed: sentiment_score +12
  - Wave 4 pullback entry: sentiment_score +8
  - Wave 5 exhaustion risk: sentiment_score -5
