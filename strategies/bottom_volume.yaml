# Bottom Volume Surge Strategy

name: bottom_volume
display_name: Bottom Volume Surge
description: Detects volume surge at bottom after extended decline. Potential trend reversal signal.
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [bottom volume, volume surge bottom]
default_priority: 60
market_regimes: [trending_down]

instructions: |
  **Bottom Volume Surge Strategy**

  Reversal criteria:

  1. **Sustained Decline Confirmation**:
     - Use `get_daily_history` (30 days).
     - Price decline from 20-day high to recent low > 15%.
     - `analyze_trend` → trend_status should be BEAR or STRONG_BEAR.

  2. **Volume Anomaly**:
     - Day volume > 3x the 5-day average volume.
     - Use `get_realtime_quote` → volume_ratio > 3.0.
     - This anomaly should follow a period of extreme low volume.

  3. **Price Stabilization**:
     - Day candle closes bullish (close > open).
     - Price holds recent lows.
     - Long lower wick preferred, indicating buyer support.

  4. **Confirmation Factors**:
     - Use `search_stock_news` to check for fundamental catalyst.
     - Chip distribution: average cost near current price (cost convergence).

  5. **Risk Warning**:
     - This is a reversal signal — higher risk than trend following.
     - Recommended position size: small (max 20-30%).
     - Strict stop-loss required (set below recent lows).

  Score adjustments:
  - Bottom volume surge confirmed: sentiment_score +8
  - With bullish candle + news catalyst: additional +5
  - Note "bottom volume surge" in `buy_reason` and `pattern_analysis`.
  - Stop-loss set at recent lows.
