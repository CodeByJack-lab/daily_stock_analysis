name: expectation_repricing
display_name: Expectation Repricing
description: Earnings/policy/valuation expectation gap repair or collapse.
category: catalyst
core_rules: [1, 5]
required_tools:
  - search_stock_news
  - get_daily_history
aliases: [expectation gap, repricing]
default_priority: 35
market_regimes: [trending_up, sideways]

instructions: |
  **Expectation Repricing Strategy**

  Analysis framework:
  - Identify stocks where market expectations diverge significantly from fundamentals.
  - Upside repricing: consensus too pessimistic, positive surprise likely.
  - Downside repricing: consensus too optimistic, disappointment risk.
  - Use `search_stock_news` to gauge analyst sentiment vs actual data.
  - Entry on early signs of repricing before consensus shifts.

  Score adjustments:
  - Clear upside repricing opportunity: sentiment_score +10
  - Downside repricing risk: sentiment_score -10
