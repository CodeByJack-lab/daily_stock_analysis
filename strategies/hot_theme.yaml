name: hot_theme
display_name: Hot Theme
description: Policy/industry hotspot, sector diffusion and individual stock correlation.
category: theme
core_rules: [2, 7]
required_tools:
  - search_stock_news
  - get_sector_rankings
aliases: [hot sector, theme play]
default_priority: 55
market_regimes: [sector_hot, trending_up]

instructions: |
  **Hot Theme Strategy**

  Signal criteria:
  - Identify active market themes via `search_stock_news` and `get_sector_rankings`.
  - Themes include: AI, defense, energy, biotech policy catalysts.
  - Target stocks directly exposed to the theme narrative.
  - Best entry: early in theme cycle, before mainstream coverage.
  - Avoid entering themes that have already made 50%+ moves.

  Score adjustments:
  - Direct theme beneficiary, early stage: sentiment_score +12
  - Indirect beneficiary: sentiment_score +5
  - Late-stage theme exhaustion: sentiment_score -8
