name: chan_theory
display_name: "Chan Theory"
description: Chan Zhushanchan theory: stroke/segment/center analysis.
category: advanced
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [chan, stroke segment]
default_priority: 85
market_regimes: [trending_up, sideways]

instructions: |
  **Chan Theory Strategy**

  Analysis framework:
  - Identify price strokes (bi) using fractal highs and lows.
  - Segments (xian duan) form from multiple strokes.
  - Central zones (zhongshu) identify consolidation areas.
  - Buy signals: third type buy point (price pulls back to central zone, volume contracts).
  - Trend continuation confirmed when price breaks above prior central zone high.

  Score adjustments:
  - Third type buy point confirmed: sentiment_score +10
  - Central zone breakout with volume: sentiment_score +8
