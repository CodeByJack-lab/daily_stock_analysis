# Shrink Volume Pullback Strategy

name: shrink_pullback
display_name: Shrink Pullback
description: Detects low-volume pullback to MA support signals. Ideal entry point for trend continuation.
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [shrink pullback, pullback]
default_router: true
default_priority: 40
market_regimes: [trending_down, sideways]

instructions: |
  **Shrink Volume Pullback Strategy**

  Entry criteria:

  1. **Prerequisite (Trend Trading)**:
     - Stock must be in an uptrend (MA5 > MA10 > MA20).
     - Use `analyze_trend` to confirm bullish alignment.

  2. **Pullback Detection**:
     - Use `get_daily_history` and `get_realtime_quote`.
     - Price pulls back to MA5 (within 1% tolerance) or MA10 (within 2% tolerance).
     - Volume during pullback < 70% of 5-day average volume (shrinkage characteristic).
     - `analyze_trend` → volume_status should show volume contraction.

  3. **Rebound Signal**:
     - Current price holds MA support level.
     - MA5 bias rate < 2% — optimal buy zone.

  4. **Confirmation Conditions**:
     - `search_stock_news` shows no major negative news.
     - Chip distribution is healthy (profit ratio 50-80%).

  Score adjustments:
  - Shrink pullback to MA5: sentiment_score +10
  - Shrink pullback to MA10 with volume < 0.6x average: sentiment_score +8
  - Ideal entry at MA5 level, secondary entry at MA10.
  - Stop-loss at MA20 level.
  - Note "shrink pullback" in `buy_reason`.
