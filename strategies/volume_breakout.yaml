# Volume Breakout Strategy

name: volume_breakout
display_name: Volume Breakout
description: Detects high-volume breakout above resistance. Applicable when price approaches known resistance.
category: trend
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [volume breakout, breakout]
default_priority: 30
market_regimes: [trending_up]

instructions: |
  **Volume Breakout Strategy**

  Breakout criteria:

  1. **Resistance Identification**:
     - Use `analyze_trend` → resistance_levels to identify resistance.
     - Typically 20-day high or prior consolidation platform top.

  2. **Volume Confirmation**:
     - Day volume > 2x the 5-day average volume.
     - Use `get_realtime_quote` → volume_ratio > 2.0 to confirm.
     - Use `get_daily_history` to cross-validate average volume calculation.

  3. **Price Confirmation**:
     - Closing price must clear resistance level.
     - Close should be in the upper 30% of the day's range (strong close).
     - Post-breakout bias check: still needs < 5% to avoid chasing.

  4. **Follow-through Verification** (if data available):
     - Next day open should remain above breakout level to distinguish real vs fake breakout.

  5. **Risk Filter**:
     - Check `search_stock_news` for no major negative catalysts.
     - PE should not be excessively high (avoid bubble-type breakouts).

  Score adjustments:
  - Confirmed volume breakout: sentiment_score +12
  - Breakout with sector co-movement: additional +5
  - Ideal entry near breakout level, stop-loss 3% below breakout level.
  - Note "volume breakout" in `buy_reason` and `volume_analysis`.
